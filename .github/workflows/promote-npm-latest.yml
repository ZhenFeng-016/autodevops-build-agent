name: Promote npm packages to latest

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Already published version to promote from next to latest"
        required: true
        type: string
        default: "1.2.0"

permissions:
  contents: read

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Install OIDC-capable npm
        run: npm install --global npm@11.5.1
      - run: npm ci
      - name: Verify promotion eligibility
        run: npm run release:promote -- ${{ inputs.version }} --check
      - name: Verify npm promotion token
        run: |
          if [ -z "${NPM_PROMOTE_TOKEN:-}" ]; then
            echo "NPM_PROMOTE_TOKEN is required in the npm GitHub environment."
            echo "Use a granular automation token scoped only to @zhenfengxx contracts, agent-sdk, repo-inspector, and build-agent."
            echo "Trusted Publishing covers npm publish, but npm dist-tag add still requires token authentication."
            exit 1
          fi
        env:
          NPM_PROMOTE_TOKEN: ${{ secrets.NPM_PROMOTE_TOKEN }}
      - name: Promote version to latest
        run: npm run release:promote -- ${{ inputs.version }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PROMOTE_TOKEN }}
      - name: Verify published latest install
        run: npm run release:verify -- ${{ inputs.version }}
